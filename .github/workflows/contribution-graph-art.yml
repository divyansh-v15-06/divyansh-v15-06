name: Generate Breakout

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch: {}

jobs:
  generate-svg:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SVG
        uses: cyprieng/github-breakout@v1
        with:
          github_username: ${{ github.repository_owner }}
          paddle_color: "50fa7b"
          ball_color: "f1fa8c"
          bricks_colors: "21222c,44475a,6272a4,bd93f9,ff79c6"

      - name: Move generated SVG to temp
        run: |
          mkdir -p /tmp/breakout-images
          mv output/custom.svg /tmp/breakout-images/breakout.svg

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and force-push SVG to output branch
        run: |
          git checkout --orphan output
          git rm -rf .
          mv /tmp/breakout-images/breakout.svg breakout.svg
          git add breakout.svg
          git commit -m "chore: update GitHub breakout SVG" || echo "No changes to commit"
          git push --force origin output
