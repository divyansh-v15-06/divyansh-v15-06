name: Generate Breakout

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch: {}

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Pac-Man graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Move generated SVG to temp
        run: |
          mkdir -p /tmp/pacman-images
          cp dist/pacman-contribution-graph.svg /tmp/pacman-images/breakout.svg

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and force-push SVG to output branch
        run: |
          git checkout --orphan output
          git rm -rf .
          mv /tmp/pacman-images/breakout.svg breakout.svg
          git add breakout.svg
          git commit -m "chore: update Pac-Man contribution SVG" || echo "No changes to commit"
          git push --force origin output
